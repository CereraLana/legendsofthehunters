<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Книга</title>

<style>
body{
  margin:0;
  background:#070714;
  color:#f2eaff;
  font-family:Georgia, serif;
}

.page{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:35px 0 80px;
}

.back{
  color:#cfc7ff;
  text-decoration:none;
  font-size:18px;
}

.book-top{
  display:flex;
  gap:35px;
  margin-top:45px;
  align-items:flex-start;
}

.cover{
  width:180px;
  border-radius:22px;
  overflow:hidden;
  background:#151522;
  border:1px solid #343454;
}

.cover img{
  width:100%;
  display:block;
}

.info{
  flex:1;
}

h1{
  font-size:54px;
  margin:0 0 15px;
}

.meta{
  color:#bdb5df;
  font-size:20px;
  margin-bottom:18px;
}

.description{
  font-size:20px;
  line-height:1.6;
  color:#d7d2e8;
}

.characters{
  margin-top:60px;
}

.characters h2{
  font-size:38px;
  margin-bottom:25px;
}

.characters-grid{
  display:flex;
  gap:22px;
  flex-wrap:wrap;
}

.character-card{
  width:130px;
  text-align:center;
  color:#f2eaff;
  text-decoration:none;
}

.character-card img{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:50%;
  background:#151522;
  border:1px solid #343454;
}

.character-name{
  margin-top:10px;
  font-size:18px;
}

@media(max-width:700px){
 .book-top{
  gap:20px;
}

h1{
  font-size:30px;
  margin:10px 0;
}

.meta{
  font-size:18px;
}

.description{
  font-size:18px;
  line-height:1.6;
}

  .cover{
  width:220px !important;
}

.cover img{
  width:100%;
  display:block;
}

  .characters-grid{
    justify-content:center;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="book-top">

    <div class="cover">
      <img id="book-cover" src="">
    </div>

    <div class="info">
      <h1 id="book-title"></h1>
      <div class="meta" id="book-meta"></div>
      <div class="description" id="book-description"></div>
    </div>

  </div>

  <div class="characters">
    <h2>Персонажи0</h2>
    <div class="characters-grid" id="characters-grid"></div>
  </div>

</div>

<script src="./data/books.js"></script>
<script src="./data/characters.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

const book = books.find(b => b.id === bookId);

if (!book) {
  document.body.innerHTML = "<h1 style='color:white;padding:40px'>Книга не найдена</h1>";
} else {
  document.title = book.title;

  document.getElementById("book-title").textContent = book.title;
  document.getElementById("book-cover").src = book.cover;
  document.getElementById("book-meta").textContent = `${book.series} • Книга ${book.number}`;
  document.getElementById("book-description").textContent = book.description || "Описание книги будет добавлено позже.";

  const grid = document.getElementById("characters-grid");

  book.characters.forEach(characterId => {
    const character = characters.find(c => c.id === characterId);

    if (character) {
      grid.innerHTML += `
        <a class="character-card" href="character.html?id=${character.id}">
          <img src="${character.image}" alt="${character.name}">
          <div class="character-name">${character.name}</div>
        </a>
      `;
    }
  });
}
</script>

</body>
</html>
