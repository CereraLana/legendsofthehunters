<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Книга</title>

<style>
body{
  margin:0;
  background:#070714;
  color:#f2eaff;
  font-family:Georgia, serif;
}

.page{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:15px 0 80px;
}

.book-top{
  display:flex;
  gap:35px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.cover{
  width:180px;
  border-radius:22px;
  overflow:hidden;
  background:#151522;
  border:1px solid #343454;
}

.cover img{
  width:100%;
  display:block;
}

.info{
  flex:1;
  padding-top:20px;
}

h1{
  width:100%;
  font-size:54px;
  text-align:center;
  margin:0 0 25px;
}

.meta{
  color:#bdb5df;
  font-size:20px;
  margin-bottom:18px;
}

.description{
  font-size:20px;
  line-height:1.6;
  color:#d7d2e8;
  white-space:pre-line;
  margin-top:30px;
}

.characters{
  margin-top:60px;
}

.characters h2{
  font-size:38px;
  margin-bottom:25px;
}

.characters-grid{
  display:flex;
  gap:22px;
  flex-wrap:wrap;
}

.character-card{
  width:130px;
  text-align:center;
  color:#f2eaff;
  text-decoration:none;
}

.character-card img{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:50%;
  background:#151522;
  border:1px solid #343454;
}

.character-name{
  margin-top:10px;
  font-size:18px;
}

.menu{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-top:5px;
}

.menu a{
  text-decoration:none;
  color:#f2eaff;
  background:#171726;
  padding:12px 18px;
  border-radius:14px;
  border:1px solid #2e2e48;
  font-size:18px;
}

.top-banner{
  width:100%;
  margin:20px auto 6px !important;
}

.top-banner img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:24px;
  display:block;
  border:1px solid #2b2b45;
}

@media(max-width:700px){

.top-banner{
  width:100%;
  max-width:100%;
  margin-bottom:6px !important;
  overflow:hidden;
}

.top-banner img{
  width:100%;
  display:block;
}

.menu{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  width:92%;
  margin:10px auto 0;
}

.menu a{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:33px;
  font-size:16px;
  text-align:center;
}

.book-top{
  position:relative;
  display:flex;
  gap:20px;
  align-items:flex-start;
  padding-top:60px;
  margin-top:0;
}

h1{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  text-align:center;
  font-size:30px;
  margin:0;
}

.cover{
  width:200px !important;
  flex:0 0 200px;
}

.meta{
  font-size:18px;
}

.description{
  font-size:18px;
  line-height:1.6;
  margin-top:20px;
}

.characters-grid{
  justify-content:center;
}
}
</style>
</head>

<body>

<div class="top-banner">
  <img src="images/banner.jpg" alt="Легенды об Охотниках">
</div>

<section class="hero">
  <div class="menu">
    <a href="./">Главная</a>
    <a href="../characters/">Персонажи</a>
    <a href="#">Книги</a>
    <a href="#">Хронология</a>
    <a href="#">Глоссарий</a>
    <a href="#">Блог</a>
  </div>
</section>

<div class="page">

  <div class="book-top">

    <h1 id="book-title"></h1>

    <div class="cover">
      <img id="book-cover" src="">
    </div>

    <div class="info">
      <div class="meta" id="book-meta"></div>
    </div>

  </div>

  <div class="description" id="book-description"></div>

  <div class="characters">
    <h2>Персонажи</h2>
    <div class="characters-grid" id="characters-grid"></div>
  </div>

</div>

<script src="./data/books.js"></script>
<script src="./data/characters.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

const book = books.find(b => b.id === bookId);

if (!book) {
  document.body.innerHTML = "<h1 style='color:white;padding:40px'>Книга не найдена</h1>";
} else {
  document.title = book.title;

  document.getElementById("book-title").textContent = book.title;
  document.getElementById("book-cover").src = book.cover;
  document.getElementById("book-meta").textContent = `${book.series} • Книга ${book.number}`;
  document.getElementById("book-description").textContent =
    book.description || "Описание книги будет добавлено позже.";

  const grid = document.getElementById("characters-grid");

  book.characters.forEach(characterId => {
    const character = characters.find(c => c.id === characterId);

    if (character) {
      grid.innerHTML += `
        <a class="character-card" href="character.html?id=${character.id}">
          <img src="${character.image}" alt="${character.name}">
          <div class="character-name">${character.name}</div>
        </a>
      `;
    }
  });
}
</script>

</body>
</html>
