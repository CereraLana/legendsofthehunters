<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Персонажи — Легенды об Охотниках</title>

<style>

body{
  margin:0;
  background:#050512;
  color:#f2eaff;
  font-family:Georgia, serif;
}

.header{
  background:#10101d;
  border-bottom:1px solid #25253d;
  padding:18px 0;
}

.header-container{
  width:92%;
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:#f2eaff;
  text-decoration:none;
  font-size:30px;
  font-weight:bold;
}

.nav{
  display:flex;
  gap:28px;
}

.nav a{
  color:#d6d0ef;
  text-decoration:none;
  font-size:18px;
}

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
  padding:35px 0 80px;
}

.back{
  color:#cfc7ff;
  text-decoration:none;
  font-size:18px;
}

h1{
  text-align:center;
  font-size:64px;
  margin:35px 0 50px;
}

.characters-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
}

.character-card{
  width:220px;
  text-align:center;
  text-decoration:none;
  color:inherit;
  transition:0.25s;
}

.character-card:hover{
  transform:translateY(-5px);
}

.character-card img{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #2f2f4f;
  box-shadow:0 10px 25px rgba(0,0,0,0.45);
  margin-bottom:18px;
}

.character-card h2{
  font-size:28px;
  margin:0;
}

.character-card p{
  display:none;
}

.button{
  display:none;
}

@media(max-width:800px){

  .header-container{
    flex-direction:column;
    gap:18px;
  }

  .nav{
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
  }

  h1{
    font-size:46px;
  }

  .characters-grid{
    gap:28px;
  }

  .character-card{
    width:160px;
  }

  .character-card img{
    width:160px;
    height:160px;
  }

  .character-card h2{
    font-size:22px;
  }
}

</style>
</head>

<body>

<header class="header">

  <div class="header-container">

    <a class="logo" href="../">
      Легенды об Охотниках
    </a>

    <nav class="nav">
      <a href="../">Главная</a>
      <a href="../characters/">Персонажи</a>
      <a href="#">Книги</a>
      <a href="#">Хронология</a>
      <a href="#">Мир</a>
    </nav>

  </div>

</header>

<div class="container">

  <a class="back" href="../">← Главная</a>

  <h1>Персонажи</h1>

  <div class="characters-grid" id="characters-grid"></div>

</div>

<script src="../data/characters.js"></script>

<script>

const grid = document.getElementById("characters-grid");

characters.forEach(character => {

  grid.innerHTML += `

    <a class="character-card"
       href="../character.html?id=${character.id}">

      <img src="../${character.image}"
           alt="${character.name}">

      <h2>${character.name}</h2>

    </a>

  `;
});

</script>

</body>
</html>
