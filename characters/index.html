<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Персонажи — Легенды об Охотниках</title>

<style>

body{
  margin:0;
  background:#050512;
  color:#f2eaff;
  font-family:Georgia, serif;
}

.header{
  background:#10101d;
  border-bottom:1px solid #25253d;
  padding:18px 0;
}

.header-container{
  width:92%;
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:#f2eaff;
  text-decoration:none;
  font-size:30px;
  font-weight:bold;
}

.nav{
  display:flex;
  gap:28px;
}

.nav a{
  color:#d6d0ef;
  text-decoration:none;
  font-size:18px;
}

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
  padding:35px 0 80px;
}

.back{
  color:#cfc7ff;
  text-decoration:none;
  font-size:18px;
}

h1{
  text-align:center;
  font-size:64px;
  margin:35px 0 50px;
}

.characters-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
}

.character-card{
  background:#151522;
  border:1px solid #343454;
  border-radius:24px;
  padding:24px;
  transition:0.25s;
  text-decoration:none;
  color:inherit;
  display:block;
}

.character-card:hover{
  transform:translateY(-4px);
  border-color:#7d6dff;
}

.character-card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:18px;
  margin-bottom:18px;
}

.character-card h2{
  margin:0 0 12px;
  font-size:32px;
}

.character-card p{
  color:#d1cae8;
  line-height:1.6;
  margin-bottom:22px;
}

.button{
  display:inline-block;
  background:#6f63d9;
  color:white;
  padding:10px 18px;
  border-radius:12px;
  font-size:16px;
}

@media(max-width:800px){

  .header-container{
    flex-direction:column;
    gap:18px;
  }

  .nav{
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
  }

  h1{
    font-size:46px;
  }

  .characters-grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<header class="header">

  <div class="header-container">

    <a class="logo" href="../">
      Легенды об Охотниках
    </a>

    <nav class="nav">
      <a href="../">Главная</a>
      <a href="../characters/">Персонажи</a>
      <a href="#">Книги</a>
      <a href="#">Хронология</a>
      <a href="#">Мир</a>
    </nav>

  </div>

</header>

<div class="container">

  <a class="back" href="../">← Главная</a>

  <h1>Персонажи</h1>

  <div class="characters-grid" id="characters-grid"></div>

</div>

<script src="../data/characters.js"></script>

<script>

const grid = document.getElementById("characters-grid");

characters.forEach(character => {

  grid.innerHTML += `

    <a class="character-card"
       href="../character.html?id=${character.id}">

      <img src="${character.image}"
           alt="${character.name}">

      <h2>${character.name}</h2>

      <p>
        ${character.description || "Описание будет добавлено позже."}
      </p>

      <span class="button">Читать</span>

    </a>

  `;
});

</script>

</body>
</html>
