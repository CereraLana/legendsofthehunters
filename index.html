<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Легенды об Охотниках</title>

<style>
body{
  margin:0;
  background:#050512;
  color:#f2eaff;
  font-family:Georgia, serif;
}

.container{
  width:92%;
  max-width:1100px;
  margin:auto;
}

.hero{
  text-align:center;
  padding:70px 10px 45px;
}

.hero h1{
  font-size:56px;
  margin:0 0 18px;
}

.hero p{
  font-size:22px;
  line-height:1.45;
  max-width:760px;
  margin:auto;
  color:#cfc7e8;
}

.menu{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-top:35px;
}

.menu a{
  text-decoration:none;
  color:#f2eaff;
  background:#171726;
  padding:12px 22px;
  border-radius:14px;
  border:1px solid #2e2e48;
  font-size:18px;
}

.section-title{
  text-align:center;
  font-size:44px;
  margin:35px 0 35px;
}

.series-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:22px 28px;
  margin-bottom:60px;
}

.series-banner h3{
  font-size:30px;
  margin:0 0 10px;
}

.series-banner img{
  width:100%;
  height:120px;
  object-fit:cover;
  object-position:center;
  border-radius:18px;
  border:1px solid #353550;
  box-shadow:0 8px 22px rgba(0,0,0,0.45);
}

@media(max-width:700px){
  .container{
    width:90%;
  }

  .hero{
    padding:55px 8px 35px;
  }

  .hero h1{
    font-size:40px;
  }

  .hero p{
    font-size:18px;
  }

 .menu{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

  .menu a{
    font-size:16px;
    padding:12px 10px;
    text-align:center;
  }


  .section-title{
    font-size:38px;
    margin:30px 0;
  }

  .series-grid{
    grid-template-columns:1fr;
    gap:32px;
  }

  .series-banner h3{
    font-size:32px;
  }

  .series-banner img{
    height:120px;
  }
}
</style>
</head>

<body>

<div class="container">

  <section class="hero">
    <h1>Легенды об Охотниках</h1>

    <p>
      Энциклопедия мира Темных Охотников,
      персонажей, книг, хронологии и тайн серии.
    </p>

    <div class="menu">
      <a href="characters/">Персонажи</a>
      <a href="#">Книги</a>
      <a href="#">Хронология</a>
      <a href="#">Мир</a>
      <a href="#">Статьи</a>
    </div>
  </section>

  <h2 class="section-title">Серии книг</h2>

  <div class="series-grid">

    <div class="series-banner">
      <h3>Тёмные Охотники</h3>
      <a href="dark-hunters/">
        <img src="images/dark-hunters.jpg">
      </a>
    </div>

    <div class="series-banner">
      <h3>Хроники Ника</h3>
      <a href="chronicles-of-nick/">
        <img src="images/chronicles-nick.jpg">
      </a>
    </div>

    <div class="series-banner">
      <h3>Тени Огня</h3>
      <a href="shadows-of-fire/">
        <img src="images/shadows-fire.jpg">
      </a>
    </div>

    <div class="series-banner">
      <h3>Крест Мертвеца</h3>
      <a href="deadmans-cross/">
        <img src="images/deadmans-cross.jpg">
      </a>
    </div>

  </div>

</div>

</body>
</html>
