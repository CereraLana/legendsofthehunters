<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Легенды об Охотниках</title>

  <style>

    body{
      margin:0;
      background:#0b0b12;
      color:white;
      font-family:Georgia, serif;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px;
      background:
      linear-gradient(to bottom,
      rgba(10,10,20,0.9),
      rgba(5,5,10,1));
    }

    h1{
      font-size:72px;
      margin-bottom:20px;
      color:#d6d6ff;
    }

    .subtitle{
      max-width:800px;
      font-size:24px;
      color:#b8b8c9;
      line-height:1.6;
      margin-bottom:60px;
    }

    .menu{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:#1a1a2a;
      padding:20px 35px;
      border-radius:16px;
      text-decoration:none;
      color:white;
      font-size:20px;
      transition:0.3s;
      border:1px solid #2d2d44;
    }

    .card:hover{
      background:#2b2b42;
      transform:translateY(-5px);
    }

  </style>
</head>

<body>

<div class="hero">

  <h1>Легенды об Охотниках</h1>

  <div class="subtitle">
    Энциклопедия мира Темных Охотников,
    персонажей, книг, хронологии и тайн серии.
  </div>

  <div class="menu">

    <a class="card" href="characters/">
      Персонажи
    </a>

    <a class="card" href="#">
      Книги
    </a>

    <a class="card" href="#">
      Хронология
    </a>

    <a class="card" href="#">
      Мир
    </a>

    <a class="card" href="#">
      Статьи
    </a>

  </div>

</div>

</body>
</html>
