<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Легенды об Охотниках</title>

<style>

body{
  margin:0;
  background:#050512;
  color:#f2eaff;
  font-family:Georgia, serif;
}

.container{
  width:90%;
  max-width:1400px;
  margin:auto;
}

.hero{
  text-align:center;
  padding:120px 20px 80px;
}

.hero h1{
  font-size:72px;
  margin-bottom:20px;
  color:#efe7ff;
}

.hero p{
  font-size:28px;
  color:#cfc7e8;
  max-width:900px;
  margin:auto;
  line-height:1.5;
}

.menu{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:50px;
}

.menu a{
  text-decoration:none;
  color:#f2eaff;
  background:#171726;
  padding:14px 24px;
  border-radius:16px;
  border:1px solid #2e2e48;
  transition:0.3s;
  font-size:18px;
}

.menu a:hover{
  background:#6d5cff;
}

.section-title{
  text-align:center;
  font-size:64px;
  margin:40px 0 70px;
}

.series-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:40px;
  margin-bottom:100px;
}

.series-banner h3{
  color:#f2eaff;
  font-size:42px;
  margin-bottom:18px;
}

.series-banner a{
  text-decoration:none;
}

.series-banner img{
  width:100%;
  height:180px;
  object-fit:cover;
  object-position:center;
  border-radius:24px;
  border:1px solid #353550;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s;
}

.series-banner img:hover{
  transform:scale(1.02);
  border-color:#8d7bff;
}

@media(max-width:900px){

  .hero{
    padding:80px 10px 50px;
  }

  .hero h1{
    font-size:42px;
  }

  .hero p{
    font-size:22px;
  }

   .menu a{
    gap:14px;
  }
  
  .menu a{
    font-size:16px;
    padding:12px 18px;
    min-width:140px;
    text-align:center;
  }

  .section-title{
    font-size:42px;
  }

  .series-grid{
    grid-template-columns:1fr;
    gap:50px;
  }

  .series-banner h3{
    font-size:34px;
  }

  .series-banner img{
    height:140px;
  }
}

</style>
</head>

<body>

<div class="container">

  <section class="hero">

    <h1>Легенды об Охотниках</h1>

    <p>
      Энциклопедия мира Темных Охотников,
      персонажей, книг, хронологии и тайн серии.
    </p>

    <div class="menu">
      <a href="characters/">Персонажи</a>
      <a href="#">Книги</a>
      <a href="#">Хронология</a>
      <a href="#">Мир</a>
      <a href="#">Статьи</a>
    </div>

  </section>

  <h2 class="section-title">Серии книг</h2>

  <div class="series-grid">

    <div class="series-banner">
      <h3>Тёмные Охотники</h3>

      <a href="dark-hunters/">
        <img src="images/dark-hunters.jpg">
      </a>
    </div>

    <div class="series-banner">
      <h3>Хроники Ника</h3>

      <a href="chronicles-of-nick/">
        <img src="images/chronicles-nick.jpg">
      </a>
    </div>

    <div class="series-banner">
      <h3>Тени Огня</h3>

      <a href="shadows-of-fire/">
        <img src="images/shadows-fire.jpg">
      </a>
    </div>

    <div class="series-banner">
      <h3>Крест Мертвеца</h3>

      <a href="deadmans-cross/">
        <img src="images/deadmans-cross.jpg">
      </a>
    </div>

  </div>

</div>

</body>
</html>
