<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Легенды об Охотниках</title>

<style>

body{
  margin:0;
  background:#090912;
  color:white;
  font-family:Georgia, serif;
}

.hero{
  padding:80px 40px;
  text-align:center;
}

h1{
  font-size:76px;
  margin-bottom:20px;
  color:#e4deff;
}

.subtitle{
  max-width:900px;
  margin:0 auto 70px;
  font-size:24px;
  color:#bdb8d8;
  line-height:1.6;
}

.menu{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:110px;
}

.card{
  background:#171722;
  padding:18px 30px;
  border-radius:16px;
  border:1px solid #2f2f45;
  color:white;
  text-decoration:none;
  font-size:20px;
  transition:0.3s;
}

.card:hover{
  background:#27273a;
  transform:translateY(-4px);
}

.series-title{
  font-size:52px;
  margin-bottom:60px;
  color:#ece8ff;
}

.series-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
  gap:55px;
  max-width:1300px;
  margin:0 auto;
}

.series-banner{
  text-decoration:none;
  transition:0.4s;
}

.series-banner:hover{
  transform:translateY(-6px);
}

.series-banner h3{
  text-align:left;
  color:#ece8ff;
  font-size:46px;
  margin-bottom:18px;
}

.series-banner img{
  width:100%;
  height:160px;
  object-fit:cover;
   object-position:center;
  border-radius:24px;
  border:1px solid #353550;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

@media(max-width:700px){

  h1{
    font-size:52px;
  }

  .subtitle{
    font-size:20px;
  }

  .series-grid{
    grid-template-columns:1fr;
  }

  .series-banner h3{
    font-size:34px;
  }

}

</style>
</head>

<body>

<div class="hero">

  <h1>Легенды об Охотниках</h1>

  <div class="subtitle">
    Энциклопедия мира Темных Охотников,
    персонажей, книг, хронологии и тайн серии.
  </div>

  <div class="menu">

    <a class="card" href="characters/">
      Персонажи
    </a>

    <a class="card" href="#">
      Книги
    </a>

    <a class="card" href="#">
      Хронология
    </a>

    <a class="card" href="#">
      Мир
    </a>

    <a class="card" href="#">
      Статьи
    </a>

  </div>

  <h2 class="series-title">
    Серии книг
  </h2>

  <div class="series-grid">

    <a class="series-banner" href="dark-hunters/">

      <h3>Тёмные Охотники</h3>

      <img src="images/dark-hunters.jpg">

    </a>

    <a class="series-banner" href="chronicles-of-nick/">

      <h3>Хроники Ника</h3>

      <img src="images/chronicles-nick.jpg">

    </a>

    <a class="series-banner" href="shadows-of-fire/">

      <h3>Тени Огня</h3>

      <img src="images/shadows-fire.jpg">

    </a>

    <a class="series-banner" href="deadmans-cross/">

      <h3>Крест Мертвеца</h3>

      <img src="images/deadmans-cross.jpg">

    </a>

  </div>

</div>

</body>
</html>
