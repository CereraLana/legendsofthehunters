<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тени Огня — Легенды об Охотниках</title>

<style>
body{
  margin:0;
  background:#050512;
  color:#f2eaff;
  font-family:Georgia, serif;
}
.menu{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-top:15px;
}

.menu a{
  text-decoration:none;
  color:#f2eaff;
  background:#171726;
  padding:12px 22px;
 
  border:1px solid #2e2e48;
  font-size:18px;
}
.container{
  width:92%;
  max-width:1200px;
  margin:auto;
  padding:35px 0 70px;
}

.back{
  color:#cfc7ff;
  text-decoration:none;
  font-size:18px;
}

h1{
  font-size:56px;
  text-align:center;
  margin:45px 0 15px;
}

.subtitle{
  text-align:center;
  color:#cfc7e8;
  font-size:22px;
  line-height:1.5;
  max-width:800px;
  margin:0 auto 55px;
}

.books-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:10px;
}

.book-card{
  position:relative;
  background:#151522;
  border:1px solid #343454;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.45);
  text-decoration:none;
color:inherit;
display:block;
}

.book-card img{
  width:100%;
  height:250px;
  object-fit:contain;
  display:block;

}

.book-info{
  padding:20px;
}

.number{
  color:#9f94ff;
  font-size:16px;
  margin-bottom:8px;
}

.book-info h2{
  font-size:24px;
  margin:0 0 12px;
}

.status{
  position:absolute;
  top:10px;
  left:10px;
  background:#2f815d;
  color:white;
  padding:5px 12px;
  border-radius:20px;
  font-size:10px;
  z-index:5;
}

.future{
  background:#8a4d2c;
}
.top-banner{
  width:100%;
  margin:20px auto 10px;
}

.top-banner img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:24px;
  display:block;
  border:1px solid #2b2b45;
}
.note{
  color:#c9c3d8;
  line-height:1.5;
  margin-top:14px;
}

@media(max-width:700px){
  h1{
    font-size:42px;
  }
  
.menu{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  width:92%;
  margin:18px auto 0;
}

.menu a{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  font-size:14px;
  padding:6px 4px;
  border-radius:14px;
}
  
  .subtitle{
    font-size:18px;
  }

  .books-grid{
    grid-template-columns:repeat(2,1fr);
    gap:18px;
  }

  .book-card img{
  height:260px;
  object-fit:cover;
  object-position:center 35%;
}

  .book-info{
    padding:14px;
  }

  .book-info h2{
    font-size:18px;
  }
}
</style>
</head>

<body>
<div class="top-banner">
  <img src="../images/banner.jpg" alt="Легенды об Охотниках">
</div>
<div class="container">

  <section class="hero">

    <div class="menu">
      <a href="../">Главная</a>
      <a href="../characters/">Персонажи</a>
      <a href="#">Книги</a>
      <a href="#">Хронология</a>
      <a href="#">Глоссарий</a>
      <a href="#">Блог</a>
    </div>
  </section>

  <h1>Тени Огня</h1>

  <div class="subtitle">
    Спин-офф «Хроник Ника». Книги расположены в хронологическом порядке.
  </div>

  <div class="books-grid">

    <a class="book-card" href="../book.html?id=diversion">
  <img src="../images/shadows-of-fire/diversion.jpg" alt="Diversion">
  <div class="book-info">
    <div class="number">Диверсия (1)</div>
    <span class="status">В планах</span>
  </div>
</a>

<a class="book-card" href="../book.html?id=last-christmas">
  <span class="status">Завершён</span>
  <img src="../images/shadows-of-fire/last-christmas.jpg" alt="Last Christmas">
  <div class="book-info">
    <div class="number">Последнее Рождество (1.5)</div>
    <div class="note">Калеб и Лиллиана</div>
  </div>
</a>

<a class="book-card" href="../book.html?id=savage">
  <img src="../images/shadows-of-fire/savage.jpg" alt="Savage">
  <div class="book-info">
    <div class="number">Зверь (2)</div>
    <span class="status">В планах</span>
  </div>
</a>

<a class="book-card" href="../book.html?id=simi">
  <img src="../images/shadows-of-fire/simi.jpg" alt="Simi / Сими">
  <div class="book-info">
    <div class="number">Сими (3)</div>
    <span class="status">Активный</span>
  </div>
</a>

<a class="book-card" href="../book.html?id=sanctify">
  <img src="../images/shadows-of-fire/sanctify.jpg" alt="Sanctify">
  <div class="book-info">
    <div class="number">Sanctify (4)</div>
    <span class="status future">Не изданный</span>
  </div>
</a>

  </div>

</div>

</body>
</html>
